  fisico:
    - ruido
    - vibracao
    - calor
    - radiacao_nao_ionizante
    - pressao_anormal
    - frio
  quimico:
    - gas_toxico
    - vapores_inflamaveis
    - particulas_em_suspensao
    - neblinas_acidas
    - poeiras_minerais
  biologico:
    - microorganismos
    - insetos
    - fungos
  ergonomico:
    - postura_inadequada
    - esforco_repetitivo
    - levantamento_manual_de_carga
    - jornada_prolongada
  acidente:
    - queda_de_altura
    - choque_eletrico
    - aprisionamento
    - projecao_de_fragmentos
    - atropelamento
    - queimadura
