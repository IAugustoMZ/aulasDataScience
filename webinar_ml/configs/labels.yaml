# ============================================================
# Incident Types (Tipos de Ocorrência)
# ============================================================
incident_types:
  - near_miss
  - acidente_com_lesao
  - acidente_sem_lesao
  - quase_acidente
  - falha_de_equipamento
  - vazamento
  - incendio
  - explosao
  - condicao_insegura
  - ato_inseguro
  - emergencia_medica
  - dano_ambiental

# ============================================================
# Risk Factors (Fatores de Risco) — NR-based
# ============================================================
